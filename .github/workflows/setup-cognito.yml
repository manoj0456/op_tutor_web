name: Setup Cognito (run once)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-2

      - name: Create Cognito User Pool
        id: pool
        run: |
          POOL_ID=$(aws cognito-idp create-user-pool \
            --pool-name optutor-users \
            --region us-east-2 \
            --username-attributes email \
            --auto-verified-attributes email \
            --policies 'PasswordPolicy={MinimumLength=8,RequireUppercase=true,RequireLowercase=true,RequireNumbers=true,RequireSymbols=false}' \
            --account-recovery-setting 'RecoveryMechanisms=[{Priority=1,Name=verified_email}]' \
            --query 'UserPool.Id' \
            --output text)
          echo "pool_id=$POOL_ID" >> "$GITHUB_OUTPUT"
          echo "User Pool created: $POOL_ID"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2

      - name: Create App Client (public SPA, no secret)
        id: client
        run: |
          CLIENT_ID=$(aws cognito-idp create-user-pool-client \
            --user-pool-id "${{ steps.pool.outputs.pool_id }}" \
            --client-name optutor-web-client \
            --no-generate-secret \
            --explicit-auth-flows \
              ALLOW_USER_SRP_AUTH \
              ALLOW_USER_PASSWORD_AUTH \
              ALLOW_REFRESH_TOKEN_AUTH \
            --region us-east-2 \
            --query 'UserPoolClient.ClientId' \
            --output text)
          echo "client_id=$CLIENT_ID" >> "$GITHUB_OUTPUT"
          echo "App Client created: $CLIENT_ID"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2

      - name: Save secrets to GitHub
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          POOL_ID="${{ steps.pool.outputs.pool_id }}"
          CLIENT_ID="${{ steps.client.outputs.client_id }}"
          gh secret set NEXT_PUBLIC_COGNITO_USER_POOL_ID --body "$POOL_ID" --repo "$GITHUB_REPOSITORY"
          gh secret set NEXT_PUBLIC_COGNITO_CLIENT_ID --body "$CLIENT_ID" --repo "$GITHUB_REPOSITORY"
          echo "Secrets saved."

      - name: Job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## Cognito Setup Complete

          | Resource      | Value |
          |---------------|-------|
          | User Pool ID  | ${{ steps.pool.outputs.pool_id }} |
          | App Client ID | ${{ steps.client.outputs.client_id }} |
          | Pool Name     | optutor-users |
          | Region        | us-east-2 |

          Next steps:
          1. Run **Deploy Backend** workflow
          2. Run **Setup Users** workflow
          3. Push to main to rebuild frontend
          SUMMARY