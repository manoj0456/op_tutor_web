name: Setup AWS Infrastructure (run once)

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Create S3 bucket
        run: |
          # Create bucket in us-east-2
          aws s3api create-bucket \
            --bucket tutor-oppertunitypool-com \
            --region us-east-2 \
            --create-bucket-configuration LocationConstraint=us-east-2 \
            || echo "Bucket already exists, continuing..."

          # Disable public access block so CloudFront OAC can read it
          aws s3api put-public-access-block \
            --bucket tutor-oppertunitypool-com \
            --public-access-block-configuration \
              BlockPublicAcls=false,IgnorePublicAcls=false,BlockPublicPolicy=false,RestrictPublicBuckets=false

          # Enable static website hosting
          aws s3 website s3://tutor-oppertunitypool-com/ \
            --index-document index.html \
            --error-document 404/index.html

          # Set bucket policy for public read (CloudFront uses this)
          aws s3api put-bucket-policy \
            --bucket tutor-oppertunitypool-com \
            --policy '{
              "Version": "2012-10-17",
              "Statement": [{
                "Sid": "PublicReadGetObject",
                "Effect": "Allow",
                "Principal": "*",
                "Action": "s3:GetObject",
                "Resource": "arn:aws:s3:::tutor-oppertunitypool-com/*"
              }]
            }'

          echo "S3 bucket tutor-oppertunitypool-com configured."

      - name: Check ACM certificate
        env:
          ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
        run: |
          # ACM cert must be in us-east-1 for CloudFront
          STATUS=$(aws acm describe-certificate \
            --certificate-arn "$ACM_CERTIFICATE_ARN" \
            --region us-east-1 \
            --query 'Certificate.Status' \
            --output text 2>/dev/null || echo "NOT_FOUND")
          echo "ACM certificate status: $STATUS"
          if [ "$STATUS" != "ISSUED" ]; then
            echo "ERROR: ACM certificate is not ISSUED. Ensure ACM_CERTIFICATE_ARN points to a valid, issued wildcard cert in us-east-1."
            exit 1
          fi

      - name: Create CloudFront distribution
        env:
          ACM_CERTIFICATE_ARN: ${{ secrets.ACM_CERTIFICATE_ARN }}
        run: |
          S3_WEBSITE_ENDPOINT="tutor-oppertunitypool-com.s3-website.us-east-2.amazonaws.com"

          DIST_CONFIG=$(cat <<EOF
          {
            "Comment": "tutor.oppertunitypool.com CDN",
            "Origins": {
              "Quantity": 1,
              "Items": [{
                "Id": "S3-tutor-oppertunitypool-com",
                "DomainName": "${S3_WEBSITE_ENDPOINT}",
                "CustomOriginConfig": {
                  "HTTPPort": 80,
                  "HTTPSPort": 443,
                  "OriginProtocolPolicy": "http-only"
                }
              }]
            },
            "DefaultCacheBehavior": {
              "TargetOriginId": "S3-tutor-oppertunitypool-com",
              "ViewerProtocolPolicy": "redirect-to-https",
              "CachePolicyId": "658327ea-f89d-4fab-a63d-7e88639e58f6",
              "Compress": true,
              "AllowedMethods": {
                "Quantity": 2,
                "Items": ["GET", "HEAD"]
              }
            },
            "CustomErrorResponses": {
              "Quantity": 2,
              "Items": [
                {
                  "ErrorCode": 404,
                  "ResponsePagePath": "/404.html",
                  "ResponseCode": "404",
                  "ErrorCachingMinTTL": 10
                },
                {
                  "ErrorCode": 403,
                  "ResponsePagePath": "/404.html",
                  "ResponseCode": "404",
                  "ErrorCachingMinTTL": 10
                }
              ]
            },
            "Aliases": {
              "Quantity": 1,
              "Items": ["tutor.oppertunitypool.com"]
            },
            "ViewerCertificate": {
              "ACMCertificateArn": "${ACM_CERTIFICATE_ARN}",
              "SSLSupportMethod": "sni-only",
              "MinimumProtocolVersion": "TLSv1.2_2021"
            },
            "Enabled": true,
            "HttpVersion": "http2and3",
            "PriceClass": "PriceClass_100",
            "CallerReference": "tutor-oppertunitypool-$(date +%s)"
          }
          EOF
          )

          RESULT=$(aws cloudfront create-distribution \
            --distribution-config "$DIST_CONFIG" \
            --output json)

          DIST_ID=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['Distribution']['Id'])")
          DIST_DOMAIN=$(echo "$RESULT" | python3 -c "import sys,json; print(json.load(sys.stdin)['Distribution']['DomainName'])")

          echo "=========================================="
          echo "CloudFront Distribution created!"
          echo "Distribution ID : $DIST_ID"
          echo "CloudFront Domain: $DIST_DOMAIN"
          echo ""
          echo "NEXT STEPS:"
          echo "1. Add GitHub secret TUTOR_CLOUDFRONT_DISTRIBUTION_ID = $DIST_ID"
          echo "2. Add DNS CNAME: tutor.oppertunitypool.com -> $DIST_DOMAIN"
          echo "   (or in Route 53: alias record tutor -> $DIST_DOMAIN)"
          echo "3. Push to main to trigger first deploy"
          echo "=========================================="
