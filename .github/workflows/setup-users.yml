name: Setup Users (run once)

on:
  workflow_dispatch:

env:
  AWS_REGION:  us-east-2
  ADMIN_EMAIL: manoj@oppertunitypool.com

jobs:
  setup-users:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-2

      - name: Assign SUPER_ADMIN role in DynamoDB
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")

          aws dynamodb put-item \
            --table-name OpTutor-UserRoles \
            --region "$AWS_REGION" \
            --item "{\"userEmail\":{\"S\":\"$ADMIN_EMAIL\"},\"roleId\":{\"S\":\"SUPER_ADMIN\"},\"roleName\":{\"S\":\"Super Admin\"},\"name\":{\"S\":\"Manoj\"},\"assignedBy\":{\"S\":\"system\"},\"assignedAt\":{\"S\":\"$NOW\"}}"

          echo "Assigned SUPER_ADMIN to $ADMIN_EMAIL"

      - name: Job summary
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## Users Setup Complete

          | User  | Email                          | Role        |
          |-------|--------------------------------|-------------|
          | Manoj | ${{ env.ADMIN_EMAIL }}         | SUPER_ADMIN |

          **Note:** Log in at [tutor.oppertunitypool.com/login](https://tutor.oppertunitypool.com/login) using your oppertunitypool.com credentials.
          SUMMARY
