name: Sync Cognito Users → Employees + Assign Roles

on:
  workflow_dispatch:

env:
  AWS_REGION:       us-east-2
  SUPER_ADMIN_EMAIL: manoj@oppertunitypool.com

jobs:
  sync-users:
    runs-on: ubuntu-latest

    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            us-east-2

      - name: Ensure optutor-employees table exists
        run: |
          if aws dynamodb describe-table --table-name optutor-employees --region "$AWS_REGION" 2>/dev/null; then
            echo "Table optutor-employees already exists"
          else
            aws dynamodb create-table \
              --table-name optutor-employees \
              --attribute-definitions AttributeName=userId,AttributeType=S \
              --key-schema AttributeName=userId,KeyType=HASH \
              --billing-mode PAY_PER_REQUEST \
              --region "$AWS_REGION"
            aws dynamodb wait table-exists --table-name optutor-employees --region "$AWS_REGION"
            echo "Created optutor-employees table"
          fi

      - name: List all Cognito users and sync
        env:
          COGNITO_USER_POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
        run: |
          NOW=$(date -u +"%Y-%m-%dT%H:%M:%S.000Z")
          SUPER_ADMIN_EMAIL="${{ env.SUPER_ADMIN_EMAIL }}"

          echo "Fetching users from Cognito pool: $COGNITO_USER_POOL_ID"

          # List all users (handles pagination)
          USERS_JSON=$(aws cognito-idp list-users \
            --user-pool-id "$COGNITO_USER_POOL_ID" \
            --region "$AWS_REGION" \
            --output json)

          echo "$USERS_JSON" | jq -r '.Users[] | @base64' | while read -r ENCODED; do
            USER=$(echo "$ENCODED" | base64 -d)

            USERNAME=$(echo "$USER" | jq -r '.Username')
            EMAIL=$(echo "$USER"   | jq -r '.Attributes[] | select(.Name=="email") | .Value // ""')
            NAME=$(echo "$USER"    | jq -r '.Attributes[] | select(.Name=="name") | .Value // ""')
            CREATED=$(echo "$USER" | jq -r '.UserCreateDate // ""')

            # Fall back to username if no name/email attribute
            if [ -z "$EMAIL" ]; then EMAIL="$USERNAME"; fi
            if [ -z "$NAME" ];  then NAME="$EMAIL"; fi

            # Determine role
            if [ "$EMAIL" = "$SUPER_ADMIN_EMAIL" ]; then
              ROLE="SUPER_ADMIN"
              ROLE_NAME="Super Admin"
            else
              ROLE="ADMIN"
              ROLE_NAME="Admin"
            fi

            echo "Processing: $EMAIL -> $ROLE"

            # 1. Write to optutor-employees
            aws dynamodb put-item \
              --table-name optutor-employees \
              --region "$AWS_REGION" \
              --item "{
                \"userId\":    {\"S\": \"$USERNAME\"},
                \"email\":     {\"S\": \"$EMAIL\"},
                \"name\":      {\"S\": \"$NAME\"},
                \"role\":      {\"S\": \"$ROLE\"},
                \"roleName\":  {\"S\": \"$ROLE_NAME\"},
                \"createdAt\": {\"S\": \"$CREATED\"},
                \"syncedAt\":  {\"S\": \"$NOW\"}
              }"

            echo "  ✓ Written to optutor-employees"

            # 2. Write to OpTutor-UserRoles (used by the app permission system)
            aws dynamodb put-item \
              --table-name OpTutor-UserRoles \
              --region "$AWS_REGION" \
              --item "{
                \"userEmail\":   {\"S\": \"$EMAIL\"},
                \"roleId\":      {\"S\": \"$ROLE\"},
                \"roleName\":    {\"S\": \"$ROLE_NAME\"},
                \"name\":        {\"S\": \"$NAME\"},
                \"assignedBy\":  {\"S\": \"system\"},
                \"assignedAt\":  {\"S\": \"$NOW\"}
              }"

            echo "  ✓ Role $ROLE assigned in OpTutor-UserRoles"

            # 3. Sync Cognito group — remove all existing groups, add the correct one
            EXISTING_GROUPS=$(aws cognito-idp admin-list-groups-for-user \
              --user-pool-id "$COGNITO_USER_POOL_ID" \
              --username "$USERNAME" \
              --region "$AWS_REGION" \
              --output json | jq -r '.Groups[].GroupName')

            for GRP in $EXISTING_GROUPS; do
              aws cognito-idp admin-remove-user-from-group \
                --user-pool-id "$COGNITO_USER_POOL_ID" \
                --username "$USERNAME" \
                --group-name "$GRP" \
                --region "$AWS_REGION" 2>/dev/null || true
              echo "  - Removed from Cognito group: $GRP"
            done

            # Ensure the target group exists (create idempotently)
            aws cognito-idp create-group \
              --user-pool-id "$COGNITO_USER_POOL_ID" \
              --group-name "$ROLE" \
              --region "$AWS_REGION" 2>/dev/null || true

            aws cognito-idp admin-add-user-to-group \
              --user-pool-id "$COGNITO_USER_POOL_ID" \
              --username "$USERNAME" \
              --group-name "$ROLE" \
              --region "$AWS_REGION"

            echo "  ✓ Added to Cognito group: $ROLE"
            echo "---"
          done

      - name: Verify employee count
        run: |
          COUNT=$(aws dynamodb scan \
            --table-name optutor-employees \
            --region "$AWS_REGION" \
            --select COUNT \
            --output json | jq -r '.Count')
          echo "optutor-employees now has $COUNT record(s)"

      - name: Job summary
        env:
          COGNITO_USER_POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << SUMMARY
          ## Sync Complete

          | What | Result |
          |------|--------|
          | Cognito pool | $COGNITO_USER_POOL_ID |
          | Super Admin  | ${{ env.SUPER_ADMIN_EMAIL }} → SUPER_ADMIN |
          | All others   | → ADMIN |
          | DynamoDB tables updated | optutor-employees, OpTutor-UserRoles |
          | Cognito groups updated  | SUPER_ADMIN, ADMIN |
          SUMMARY
