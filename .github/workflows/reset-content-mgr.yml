name: Reset Content Manager Password
on:
  workflow_dispatch:
jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Reset password and assign ADMIN group
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
          POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
        run: |
          echo "# List existing groups"
          aws cognito-idp list-groups --user-pool-id "$POOL_ID" --query "Groups[].GroupName" --output text

          echo "# Set permanent password"
          aws cognito-idp admin-set-user-password \
            --user-pool-id "$POOL_ID" \
            --username "contentmgr@optutor.com" \
            --password "Test@12345!" \
            --permanent
          echo "Password set"

          echo "# Create ADMIN group if not exists"
          aws cognito-idp create-group \
            --user-pool-id "$POOL_ID" \
            --group-name "ADMIN" \
            --description "Admin role group" || echo "Group may already exist"

          echo "# Add user to ADMIN group"
          aws cognito-idp admin-add-user-to-group \
            --user-pool-id "$POOL_ID" \
            --username "contentmgr@optutor.com" \
            --group-name "ADMIN"
          echo "Group assignment done"

          echo "# Verify group membership"
          aws cognito-idp admin-list-groups-for-user \
            --user-pool-id "$POOL_ID" \
            --username "contentmgr@optutor.com" \
            --query "Groups[].GroupName" --output text
