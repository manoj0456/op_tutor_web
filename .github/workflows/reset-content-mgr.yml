name: Reset Content Manager Password
on:
  workflow_dispatch:
jobs:
  reset:
    runs-on: ubuntu-latest
    steps:
      - name: Reset password and assign ADMIN group
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: us-east-2
          POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
        run: |
          # Set permanent password
          aws cognito-idp admin-set-user-password \
            --user-pool-id "$POOL_ID" \
            --username "contentmgr@optutor.com" \
            --password "Test@12345!" \
            --permanent
          echo "Password set"

          # Add to ADMIN group (ignore error if already member)
          aws cognito-idp admin-add-user-to-group \
            --user-pool-id "$POOL_ID" \
            --username "contentmgr@optutor.com" \
            --group-name "ADMIN" || echo "Already in group or group error"
          echo "Group assignment done"

          # Verify group membership
          aws cognito-idp admin-list-groups-for-user \
            --user-pool-id "$POOL_ID" \
            --username "contentmgr@optutor.com" \
            --query "Groups[].GroupName" \
            --output text
