name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'lambda/**'

env:
  AWS_REGION: us-east-2
  LAMBDA_NAME: optutor-api
  API_NAME: OpTutorAPI
  LAMBDA_ROLE_NAME: optutor-lambda-role

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Create DynamoDB tables (idempotent)
        run: |
          for TABLE in OpTutor-Roles OpTutor-UserRoles OpTutor-RoleRequests OpTutor-Courses OpTutor-LiveSessions; do
            if aws dynamodb describe-table --table-name "$TABLE" --region "$AWS_REGION" 2>/dev/null; then
              echo "Table $TABLE already exists"
            else
              PK="roleId"
              if [ "$TABLE" = "OpTutor-UserRoles" ]; then PK="userEmail"; fi
              if [ "$TABLE" = "OpTutor-RoleRequests" ]; then PK="requestId"; fi
              if [ "$TABLE" = "OpTutor-Courses" ]; then PK="courseId"; fi
              if [ "$TABLE" = "OpTutor-LiveSessions" ]; then PK="sessionId"; fi
              aws dynamodb create-table \
                --table-name "$TABLE" \
                --attribute-definitions AttributeName=${PK},AttributeType=S \
                --key-schema AttributeName=${PK},KeyType=HASH \
                --billing-mode PAY_PER_REQUEST \
                --region "$AWS_REGION"
              aws dynamodb wait table-exists --table-name "$TABLE" --region "$AWS_REGION"
              echo "Created $TABLE"
            fi
          done

      - name: Create Lambda IAM role (idempotent)
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          echo "ACCOUNT_ID=$ACCOUNT_ID" >> "$GITHUB_ENV"

          if aws iam get-role --role-name "$LAMBDA_ROLE_NAME" 2>/dev/null; then
            echo "Role already exists"
          else
            cat > /tmp/trust.json << 'EOF'
          {"Version":"2012-10-17","Statement":[{"Effect":"Allow","Principal":{"Service":"lambda.amazonaws.com"},"Action":"sts:AssumeRole"}]}
          EOF
            aws iam create-role --role-name "$LAMBDA_ROLE_NAME" --assume-role-policy-document file:///tmp/trust.json
          fi

          aws iam attach-role-policy --role-name "$LAMBDA_ROLE_NAME" \
            --policy-arn arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole 2>/dev/null || true

          cat > /tmp/dynamo-policy.json << EOF
          {"Version":"2012-10-17","Statement":[{"Effect":"Allow","Action":["dynamodb:GetItem","dynamodb:PutItem","dynamodb:DeleteItem","dynamodb:Scan","dynamodb:Query","dynamodb:BatchWriteItem"],"Resource":"arn:aws:dynamodb:${AWS_REGION}:${ACCOUNT_ID}:table/OpTutor-*"}]}
          EOF
          aws iam put-role-policy --role-name "$LAMBDA_ROLE_NAME" --policy-name OpTutorDynamoDB --policy-document file:///tmp/dynamo-policy.json

          echo "ROLE_ARN=arn:aws:iam::${ACCOUNT_ID}:role/${LAMBDA_ROLE_NAME}" >> "$GITHUB_ENV"
          echo "IAM role ready"

      - name: Install Lambda dependencies
        working-directory: lambda
        run: npm install --production

      - name: Zip Lambda
        run: |
          cd lambda
          zip -r ../lambda.zip . --exclude "*.md" --exclude "seed.mjs"
          echo "Lambda zip: $(du -sh ../lambda.zip | cut -f1)"

      - name: Deploy Lambda function
        run: |
          sleep 12
          if aws lambda get-function --function-name "$LAMBDA_NAME" --region "$AWS_REGION" 2>/dev/null; then
            aws lambda update-function-code --function-name "$LAMBDA_NAME" --zip-file fileb://lambda.zip --region "$AWS_REGION"
          else
            aws lambda create-function \
              --function-name "$LAMBDA_NAME" \
              --runtime nodejs22.x \
              --role "$ROLE_ARN" \
              --handler index.handler \
              --zip-file fileb://lambda.zip \
              --timeout 30 --memory-size 256 \
              --region "$AWS_REGION"
          fi
          aws lambda wait function-updated --function-name "$LAMBDA_NAME" --region "$AWS_REGION"
          aws lambda update-function-configuration --function-name "$LAMBDA_NAME" --runtime nodejs22.x --region "$AWS_REGION"
          aws lambda wait function-updated --function-name "$LAMBDA_NAME" --region "$AWS_REGION"
          echo "Lambda deployed"

      - name: Create or update API Gateway
        run: |
          LAMBDA_ARN="arn:aws:lambda:${AWS_REGION}:${ACCOUNT_ID}:function:${LAMBDA_NAME}"
          EXISTING=$(aws apigateway get-rest-apis --query "items[?name=='${API_NAME}'].id" --output text)

          if [ -z "$EXISTING" ] || [ "$EXISTING" = "None" ]; then
            API_ID=$(aws apigateway create-rest-api --name "$API_NAME" --description "OpTutor REST API" \
              --endpoint-configuration '{"types":["REGIONAL"]}' --query 'id' --output text)
          else
            API_ID="$EXISTING"
          fi
          echo "API_ID=$API_ID" >> "$GITHUB_ENV"

          ROOT_ID=$(aws apigateway get-resources --rest-api-id "$API_ID" --query 'items[?path==`/`].id' --output text)
          PROXY_ID=$(aws apigateway get-resources --rest-api-id "$API_ID" --query "items[?pathPart=='{proxy+}'].id" --output text)

          if [ -z "$PROXY_ID" ] || [ "$PROXY_ID" = "None" ]; then
            PROXY_ID=$(aws apigateway create-resource --rest-api-id "$API_ID" --parent-id "$ROOT_ID" --path-part '{proxy+}' --query 'id' --output text)
          fi

          aws apigateway delete-method --rest-api-id "$API_ID" --resource-id "$PROXY_ID" --http-method ANY 2>/dev/null || true
          aws apigateway put-method --rest-api-id "$API_ID" --resource-id "$PROXY_ID" --http-method ANY --authorization-type NONE --no-api-key-required
          aws apigateway put-integration --rest-api-id "$API_ID" --resource-id "$PROXY_ID" --http-method ANY --type AWS_PROXY --integration-http-method POST \
            --uri "arn:aws:apigateway:${AWS_REGION}:lambda:path/2015-03-31/functions/${LAMBDA_ARN}/invocations"

          aws apigateway delete-method --rest-api-id "$API_ID" --resource-id "$PROXY_ID" --http-method OPTIONS 2>/dev/null || true
          aws apigateway put-method --rest-api-id "$API_ID" --resource-id "$PROXY_ID" --http-method OPTIONS --authorization-type NONE --no-api-key-required
          aws apigateway put-integration --rest-api-id "$API_ID" --resource-id "$PROXY_ID" --http-method OPTIONS --type MOCK \
            --request-templates '{"application/json":"{\"statusCode\":200}"}'
          aws apigateway put-method-response --rest-api-id "$API_ID" --resource-id "$PROXY_ID" --http-method OPTIONS --status-code 200 \
            --response-parameters '{"method.response.header.Access-Control-Allow-Headers":true,"method.response.header.Access-Control-Allow-Methods":true,"method.response.header.Access-Control-Allow-Origin":true}'
          aws apigateway put-integration-response --rest-api-id "$API_ID" --resource-id "$PROXY_ID" --http-method OPTIONS --status-code 200 \
            --response-parameters '{"method.response.header.Access-Control-Allow-Headers":"'"'"'Content-Type,Authorization'"'"'","method.response.header.Access-Control-Allow-Methods":"'"'"'GET,POST,PUT,DELETE,OPTIONS'"'"'","method.response.header.Access-Control-Allow-Origin":"'"'"'*'"'"'"}'

          aws lambda remove-permission --function-name "$LAMBDA_NAME" --statement-id allow-apigw 2>/dev/null || true
          aws lambda add-permission --function-name "$LAMBDA_NAME" --statement-id allow-apigw \
            --action lambda:InvokeFunction --principal apigateway.amazonaws.com \
            --source-arn "arn:aws:execute-api:${AWS_REGION}:${ACCOUNT_ID}:${API_ID}/*/*"

          aws apigateway create-deployment --rest-api-id "$API_ID" --stage-name prod

          API_URL="https://${API_ID}.execute-api.${AWS_REGION}.amazonaws.com/prod"
          echo "API_URL=$API_URL" >> "$GITHUB_ENV"
          echo "API URL: $API_URL"

      - name: Seed DynamoDB roles
        working-directory: lambda
        run: node seed.mjs

      - name: Save NEXT_PUBLIC_API_URL secret
        env:
          GH_TOKEN: ${{ secrets.GH_PAT }}
        run: |
          gh secret set NEXT_PUBLIC_API_URL --body "$API_URL" --repo "$GITHUB_REPOSITORY"
          echo "Secret NEXT_PUBLIC_API_URL saved: $API_URL"

      - name: Deployment summary
        run: |
          echo "## Backend Deployment Complete" >> "$GITHUB_STEP_SUMMARY"
          echo "| Resource | Value |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| API URL | $API_URL |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Lambda | $LAMBDA_NAME |" >> "$GITHUB_STEP_SUMMARY"
