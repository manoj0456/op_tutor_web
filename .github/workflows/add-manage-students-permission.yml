name: Add manage_students permission to roles
on:
  workflow_dispatch:
jobs:
  patch-dynamodb:
    runs-on: ubuntu-latest
    steps:
      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2
      - name: Install boto3
        run: pip install boto3 --break-system-packages --quiet
      - name: Patch SUPER_ADMIN and ADMIN in DynamoDB
        run: |
          python3 << 'PYEOF'
          import boto3

          dynamo = boto3.resource('dynamodb', region_name='us-east-2')
          table = dynamo.Table('OpTutor-Roles')

          for role_id in ['SUPER_ADMIN', 'ADMIN']:
              resp = table.get_item(Key={'roleId': role_id})
              item = resp.get('Item', {})
              perms = list(item.get('permissions', []))
              to_add = [p for p in ['manage_employees', 'manage_students'] if p not in perms]
              if to_add:
                  new_perms = perms + to_add
                  table.update_item(
                      Key={'roleId': role_id},
                      UpdateExpression='SET #p = :p',
                      ExpressionAttributeNames={'#p': 'permissions'},
                      ExpressionAttributeValues={':p': new_perms}
                  )
                  print(f'Updated {role_id}: added {to_add}')
              else:
                  print(f'{role_id} already has all required permissions')
          PYEOF
